name: Format Check

on:
    push:
        branches:
            - main
    pull_request:
    workflow_dispatch:

jobs:
    check:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        steps:
            - uses: actions/checkout@v4
            - uses: DeterminateSystems/nix-installer-action@main
            - uses: DeterminateSystems/magic-nix-cache-action@main
              with:
                  use-gha-cache: true
                  use-flakehub: false
            - run: nix run .#ci:treefmt:check
