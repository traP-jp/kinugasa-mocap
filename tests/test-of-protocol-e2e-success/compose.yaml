x-runtime-image: &runtime-image
  image: kinugasa-test-runtime
  build:
    context: ../..
    dockerfile: tests/runtime.Dockerfile

services:
  tcp-receiver:
    <<: *runtime-image
    volumes:
      - artifacts:/artifacts
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/receiver.ready"]
      interval: 100ms
      timeout: 1s
      retries: 50
    command:
      - bash
      - -c
      - |
        set -euo pipefail
        rm -f /artifacts/receiver.done /artifacts/received.ts
        touch /tmp/receiver.ready
        ffmpeg \
          -hide_banner \
          -loglevel error \
          -y \
          -i 'tcp://0.0.0.0:12345?listen=1' \
          -t 2 \
          -c copy \
          /artifacts/received.ts
        touch /artifacts/receiver.done
        sleep 30

  test-of-protocol-e2e-success:
    <<: *runtime-image
    depends_on:
      tcp-receiver:
        condition: service_healthy
    volumes:
      - artifacts:/artifacts
    command:
      - bash
      - -c
      - |
        set -euo pipefail
        protocol_e2e \
          --duration 2 \
          --startup-delay 1.5 \
          --receiver-timeout 8 \
          --sender-url 'tcp://tcp-receiver:12345' \
          --receiver-done /artifacts/receiver.done \
          --output /artifacts/received.ts

volumes:
  artifacts:
