x-runtime-image: &runtime-image
  image: kinugasa-test-runtime
  build:
    context: ../..
    dockerfile: tests/runtime.Dockerfile

services:
  rist-receiver:
    <<: *runtime-image
    volumes:
      - artifacts:/artifacts
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/receiver.ready"]
      interval: 100ms
      timeout: 1s
      retries: 50
    command:
      - bash
      - -c
      - |
        set -euo pipefail
        rm -f /artifacts/receiver.done /artifacts/received.ts
        touch /tmp/receiver.ready
        rist_receive \
          --url 'rist://@0.0.0.0:32100' \
          --output /artifacts/received.ts \
          --duration 7 \
          --profile main
        touch /artifacts/receiver.done
        sleep 30

  test-of-kinugasa-gst-rist-success:
    <<: *runtime-image
    depends_on:
      rist-receiver:
        condition: service_healthy
    volumes:
      - artifacts:/artifacts
    command:
      - bash
      - -c
      - |
        set -euo pipefail
        protocol_e2e \
          --duration 2 \
          --startup-delay 3 \
          --receiver-timeout 12 \
          --ignore-sender-exit-status \
          --sender-url 'rist://rist-receiver:32100' \
          --receiver-done /artifacts/receiver.done \
          --output /artifacts/received.ts

volumes:
  artifacts:
