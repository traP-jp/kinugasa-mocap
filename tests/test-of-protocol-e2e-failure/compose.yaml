x-runtime-image: &runtime-image
  image: kinugasa-test-runtime
  build:
    context: ../..
    dockerfile: tests/runtime.Dockerfile

services:
  mismatched-output:
    <<: *runtime-image
    volumes:
      - artifacts:/artifacts
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/output.ready"]
      interval: 100ms
      timeout: 1s
      retries: 50
    command:
      - bash
      - -c
      - |
        set -euo pipefail
        rm -f /artifacts/receiver.done /artifacts/received.ts
        touch /tmp/output.ready
        ffmpeg \
          -hide_banner \
          -loglevel error \
          -y \
          -f lavfi \
          -i 'testsrc2=size=320x180:rate=30,hue=h=90' \
          -f lavfi \
          -i sine=frequency=1000:sample_rate=48000 \
          -t 2 \
          -c:v mpeg2video \
          -g 15 \
          -bf 0 \
          -c:a mp2 \
          -b:a 128k \
          -f mpegts \
          /artifacts/received.ts
        touch /artifacts/receiver.done
        sleep 30

  test-of-protocol-e2e-failure:
    <<: *runtime-image
    depends_on:
      mismatched-output:
        condition: service_healthy
    volumes:
      - artifacts:/artifacts
    command:
      - bash
      - -c
      - |
        set -euo pipefail
        if protocol_e2e \
          --duration 2 \
          --startup-delay 0 \
          --receiver-timeout 8 \
          --skip-send \
          --receiver-done /artifacts/receiver.done \
          --output /artifacts/received.ts \
          --compare video > /tmp/protocol_e2e.log 2>&1; then
          cat /tmp/protocol_e2e.log
          echo 'expected protocol_e2e to fail, but it passed' >&2
          exit 1
        fi

        cat /tmp/protocol_e2e.log
        grep -q 'video fingerprint mismatch' /tmp/protocol_e2e.log
        echo 'protocol_e2e failed as expected'

volumes:
  artifacts:
