x-runtime-image: &runtime-image
  image: kinugasa-test-runtime
  build:
    context: ../..
    dockerfile: tests/runtime.Dockerfile

services:
  rist-receiver:
    <<: *runtime-image
    volumes:
      - artifacts:/artifacts
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/receiver.ready"]
      interval: 100ms
      timeout: 1s
      retries: 50
    command:
      - bash
      - -c
      - |
        set -euo pipefail
        rm -f /artifacts/receiver.done /artifacts/received.ts
        touch /tmp/receiver.ready
        rist_receive \
          --url 'rist://@0.0.0.0:32100' \
          --output /artifacts/received.ts \
          --duration 7 \
          --profile main
        touch /artifacts/receiver.done
        sleep 30

  mismatched-sender:
    <<: *runtime-image
    depends_on:
      rist-receiver:
        condition: service_healthy
    command:
      - bash
      - -c
      - |
        set -euo pipefail
        sleep 1.5
        ffmpeg \
          -hide_banner \
          -loglevel error \
          -y \
          -f lavfi \
          -i 'testsrc2=size=320x180:rate=30,hue=h=90' \
          -f lavfi \
          -i sine=frequency=1000:sample_rate=48000 \
          -t 2 \
          -c:v mpeg2video \
          -g 15 \
          -bf 0 \
          -c:a mp2 \
          -b:a 128k \
          -f mpegts \
          -rist_profile main \
          rist://rist-receiver:32100 || true
        sleep 30

  test-of-kinugasa-gst-rist-failure:
    <<: *runtime-image
    depends_on:
      rist-receiver:
        condition: service_healthy
      mismatched-sender:
        condition: service_started
    volumes:
      - artifacts:/artifacts
    command:
      - bash
      - -c
      - |
        set -euo pipefail
        if protocol_e2e \
          --duration 2 \
          --startup-delay 0 \
          --receiver-timeout 12 \
          --skip-send \
          --receiver-done /artifacts/receiver.done \
          --output /artifacts/received.ts \
          --compare video > /tmp/protocol_e2e.log 2>&1; then
          cat /tmp/protocol_e2e.log
          echo 'expected kinugasa-gst::rist E2E to fail, but it passed' >&2
          exit 1
        fi

        cat /tmp/protocol_e2e.log
        grep -q 'video fingerprint mismatch' /tmp/protocol_e2e.log
        echo 'kinugasa-gst::rist E2E failed as expected'

volumes:
  artifacts:
