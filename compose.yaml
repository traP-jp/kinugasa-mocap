name: kinugasa-recording-console

x-app-s3-env: &app-s3-env
  AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY:-kinugasa}
  AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY:-kinugasa-secret}
  AWS_REGION: ${S3_REGION:-ap-northeast-1}
  AWS_ENDPOINT_URL_S3: http://minio:9000
  S3_ENDPOINT: http://minio:9000
  S3_BUCKET: ${S3_BUCKET:-kinugasa-recordings}
  S3_FORCE_PATH_STYLE: "true"

services:
  console:
    image: kinugasa-recording-console-app
    build:
      context: .
      dockerfile: server/kinugasa-recording-console-app/Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
      minio-create-bucket:
        condition: service_completed_successfully
      capture-controller:
        condition: service_started
    environment:
      <<: *app-s3-env
      DATABASE_URL: mysql://${MYSQL_USER:-kinugasa}:${MYSQL_PASSWORD:-kinugasa}@mysql:3306/${MYSQL_DATABASE:-kinugasa_recording_console}
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: ${MYSQL_DATABASE:-kinugasa_recording_console}
      MYSQL_USER: ${MYSQL_USER:-kinugasa}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-kinugasa}
      CAPTURE_CONTROLLER_ENDPOINT: http://capture-controller:50051
    ports:
      - "${CONSOLE_PORT:-8080}:8080"

  capture-controller:
    image: kinugasa-recording-capture-app
    build:
      context: .
      dockerfile: server/kinugasa-recording-capture-app/Dockerfile
    depends_on:
      minio-create-bucket:
        condition: service_completed_successfully
    environment:
      <<: *app-s3-env
      GRPC_LISTEN_ADDR: 0.0.0.0:50051
      RIST_LISTEN_ADDR: 0.0.0.0:32100
    ports:
      - "${CAPTURE_CONTROLLER_GRPC_PORT:-50051}:50051"
      - "${RIST_PORT:-32100}:32100/udp"

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-kinugasa-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-kinugasa_recording_console}
      MYSQL_USER: ${MYSQL_USER:-kinugasa}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-kinugasa}
    volumes:
      - ./server/kinugasa-infra/mysql/init:/docker-entrypoint-initdb.d:ro
      - mysql-data:/var/lib/mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-kinugasa}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-kinugasa-secret}
    volumes:
      - minio-data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    restart: unless-stopped

  minio-create-bucket:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-kinugasa}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-kinugasa-secret}
      S3_BUCKET: ${S3_BUCKET:-kinugasa-recordings}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        until mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"; do
          sleep 1
        done
        mc mb --ignore-existing "local/$${S3_BUCKET}"

volumes:
  mysql-data:
  minio-data:
